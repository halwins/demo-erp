version: '3.8'

services:
  erp-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-ai-service
    ports:
      - "${PORT:-8000}:8000"
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
