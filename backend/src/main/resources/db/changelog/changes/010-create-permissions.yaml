databaseChangeLog:
  - changeSet:
      id: 010-create-permissions-table
      author: halwins
      changes:
        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_permissions
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
                  constraints:
                    nullable: true
              - column:
                  name: code
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: module_id
                  type: UUID
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: permissions
            columnNames: code
            constraintName: uk_permissions_code
        - addForeignKeyConstraint:
            constraintName: fk_permissions_module
            baseTableName: permissions
            baseColumnNames: module_id
            referencedTableName: erp_modules
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
