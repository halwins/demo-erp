databaseChangeLog:
  - changeSet:
      id: 030-create-order-items-table
      author: halwins
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_order_items
                    nullable: false
              - column:
                  name: organization_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: tax_id
                  type: UUID
              - column:
                  name: quantity
                  type: DECIMAL(15,4)
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: subtotal
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_order_items_organization
            baseTableName: order_items
            baseColumnNames: organization_id
            referencedTableName: organizations
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_order_items_order
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_order_items_product
            baseTableName: order_items
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_order_items_tax
            baseTableName: order_items
            baseColumnNames: tax_id
            referencedTableName: taxes
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - createIndex:
            tableName: order_items
            indexName: idx_order_items_organization_id
            columns:
              - column:
                  name: organization_id
        - createIndex:
            tableName: order_items
            indexName: idx_order_items_order_id
            columns:
              - column:
                  name: order_id
