databaseChangeLog:
  - changeSet:
      id: 045-create-replenishment-requests-table
      author: halwins
      changes:
        - createTable:
            tableName: replenishment_requests
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_replenishment_requests
                    nullable: false
              - column:
                  name: warehouse_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: inventory_document_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: OPEN
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
        - addForeignKeyConstraint:
            constraintName: fk_replenishment_requests_warehouse
            baseTableName: replenishment_requests
            baseColumnNames: warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_replenishment_requests_document
            baseTableName: replenishment_requests
            baseColumnNames: inventory_document_id
            referencedTableName: inventory_documents
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_replenishment_requests_created_by
            baseTableName: replenishment_requests
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
