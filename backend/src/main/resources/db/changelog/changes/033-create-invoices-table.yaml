databaseChangeLog:
  - changeSet:
      id: 033-create-invoices-table
      author: halwins
      changes:
        - createTable:
            tableName: invoices
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_invoices
                    nullable: false
              - column:
                  name: organization_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: partner_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: invoice_number
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: DECIMAL(15,2)
                  constraints:
                    nullable: false
              - column:
                  name: paid_amount
                  type: DECIMAL(15,2)
                  defaultValueNumeric: 0.00
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: DRAFT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: updated_by
                  type: UUID
        - addUniqueConstraint:
            constraintName: uk_invoices_org_invoice_number
            tableName: invoices
            columnNames: organization_id, invoice_number
        - addForeignKeyConstraint:
            constraintName: fk_invoices_organization
            baseTableName: invoices
            baseColumnNames: organization_id
            referencedTableName: organizations
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_invoices_order
            baseTableName: invoices
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_invoices_partner
            baseTableName: invoices
            baseColumnNames: partner_id
            referencedTableName: partners
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_invoices_created_by
            baseTableName: invoices
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_invoices_updated_by
            baseTableName: invoices
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - createIndex:
            tableName: invoices
            indexName: idx_invoices_organization_id
            columns:
              - column:
                  name: organization_id
        - createIndex:
            tableName: invoices
            indexName: idx_invoices_order_id
            columns:
              - column:
                  name: order_id
        - createIndex:
            tableName: invoices
            indexName: idx_invoices_partner_id
            columns:
              - column:
                  name: partner_id
