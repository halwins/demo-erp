databaseChangeLog:
  - changeSet:
      id: 039-create-inventory-balances-table
      author: halwins
      changes:
        - createTable:
            tableName: inventory_balances
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_inventory_balances
                    nullable: false
              - column:
                  name: warehouse_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: DECIMAL(15, 4)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: updated_by
                  type: UUID
        - addForeignKeyConstraint:
            constraintName: fk_inventory_balances_warehouse
            baseTableName: inventory_balances
            baseColumnNames: warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_inventory_balances_product
            baseTableName: inventory_balances
            baseColumnNames: product_id
            referencedTableName: products
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_inventory_balances_updated_by
            baseTableName: inventory_balances
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addUniqueConstraint:
            tableName: inventory_balances
            columnNames: warehouse_id, product_id
            constraintName: uq_inventory_balance_warehouse_product
