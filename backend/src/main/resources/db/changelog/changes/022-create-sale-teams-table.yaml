databaseChangeLog:
  - changeSet:
      id: 022-create-sale-teams-table
      author: halwins
      changes:
        - createTable:
            tableName: sale_teams
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_sale_teams
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: is_archived
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: leader_id
                  type: UUID
              - column:
                  name: organization_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: updated_by
                  type: UUID
        - addForeignKeyConstraint:
            constraintName: fk_sale_teams_leader
            baseTableName: sale_teams
            baseColumnNames: leader_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_sale_teams_organization
            baseTableName: sale_teams
            baseColumnNames: organization_id
            referencedTableName: organizations
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_sale_teams_created_by
            baseTableName: sale_teams
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_sale_teams_updated_by
            baseTableName: sale_teams
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addUniqueConstraint:
            tableName: sale_teams
            columnNames: organization_id, name
            constraintName: uq_sale_teams_org_name
