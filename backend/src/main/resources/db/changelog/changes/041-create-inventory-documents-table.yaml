databaseChangeLog:
  - changeSet:
      id: 041-create-inventory-documents-table
      author: halwins
      changes:
        - createTable:
            tableName: inventory_documents
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_inventory_documents
                    nullable: false
              - column:
                  name: warehouse_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: source_warehouse_id
                  type: UUID
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_inventory_documents_name
              - column:
                  name: document_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: reference_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: reference_id
                  type: UUID
              - column:
                  name: document_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: scheduled_date
                  type: TIMESTAMP
              - column:
                  name: date_done
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: UUID
              - column:
                  name: updated_by
                  type: UUID
        - addForeignKeyConstraint:
            constraintName: fk_inventory_documents_warehouse
            baseTableName: inventory_documents
            baseColumnNames: warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_inventory_documents_source_warehouse
            baseTableName: inventory_documents
            baseColumnNames: source_warehouse_id
            referencedTableName: warehouses
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_inventory_documents_created_by
            baseTableName: inventory_documents
            baseColumnNames: created_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_inventory_documents_updated_by
            baseTableName: inventory_documents
            baseColumnNames: updated_by
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
