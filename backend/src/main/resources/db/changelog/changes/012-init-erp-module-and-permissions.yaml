databaseChangeLog:
  - changeSet:
      id: 012-init-erp-module-and-permissions
      author: halwins
      changes:
        - insert:
            tableName: erp_modules
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: ERP Module
              - column:
                  name: code
                  value: erp_module
              - column:
                  name: description
                  value: Centralized management and configuration of ERP system modules.

        - insert:
            tableName: permissions
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: erp_module:select
              - column:
                  name: code
                  value: erp_module:select
              - column:
                  name: description
                  value: Allow selecting ERP modules.
              - column:
                  name: module_id
                  valueComputed: (SELECT id FROM erp_modules WHERE code = 'erp_module')

        - insert:
            tableName: permissions
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: erp_module:read
              - column:
                  name: code
                  value: erp_module:read
              - column:
                  name: description
                  value: Allow reading ERP module configurations.
              - column:
                  name: module_id
                  valueComputed: (SELECT id FROM erp_modules WHERE code = 'erp_module')

        - insert:
            tableName: permissions
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: erp_module:write
              - column:
                  name: code
                  value: erp_module:write
              - column:
                  name: description
                  value: Allow writing/updating ERP module configurations.
              - column:
                  name: module_id
                  valueComputed: (SELECT id FROM erp_modules WHERE code = 'erp_module')

        - insert:
            tableName: permissions
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: erp_module:create
              - column:
                  name: code
                  value: erp_module:create
              - column:
                  name: description
                  value: Allow creating new ERP modules.
              - column:
                  name: module_id
                  valueComputed: (SELECT id FROM erp_modules WHERE code = 'erp_module')

        - insert:
            tableName: permissions
            columns:
              - column:
                  name: id
                  valueComputed: gen_random_uuid()
              - column:
                  name: name
                  value: erp_module:delete
              - column:
                  name: code
                  value: erp_module:delete
              - column:
                  name: description
                  value: Allow deleting ERP modules.
              - column:
                  name: module_id
                  valueComputed: (SELECT id FROM erp_modules WHERE code = 'erp_module')
