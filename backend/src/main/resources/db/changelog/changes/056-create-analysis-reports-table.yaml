databaseChangeLog:
  - changeSet:
      id: 056-create-analysis-reports-table
      author: halwins
      changes:
        - createTable:
            tableName: analysis_reports
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_analysis_reports
                    nullable: false
              - column:
                  name: organization_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: analysis_type
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: result_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_analysis_reports_organization
            baseTableName: analysis_reports
            baseColumnNames: organization_id
            referencedTableName: organizations
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE
