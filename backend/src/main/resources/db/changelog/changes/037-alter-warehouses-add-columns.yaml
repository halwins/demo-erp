databaseChangeLog:
  - changeSet:
      id: 037-alter-warehouses-add-columns
      author: halwins
      changes:
        - addColumn:
            tableName: warehouses
            columns:
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: manager_id
                  type: UUID
        - addForeignKeyConstraint:
            constraintName: fk_warehouses_manager
            baseTableName: warehouses
            baseColumnNames: manager_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL
            onUpdate: CASCADE
